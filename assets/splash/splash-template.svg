<?xml version="1.0" encoding="UTF-8"?>
<!--
  Feldhub Splash Screen Template
  
  SIZES:
  - iPhone Pro Max: 1284 x 2778
  - iPad Pro 12.9": 2048 x 2732
  - Universal safe: 1284 x 2778 (scales down)
  
  USAGE:
  1. Replace LOGO with client logo (max 400x400 in center)
  2. Update background color to tenant primaryColor
  3. Optional: Add tagline below logo
  4. Export as PNG
  
  SAFE AREAS:
  - Top: 150px (status bar + notch)
  - Bottom: 350px (home indicator + safe)
  - Logo: Centered vertically with slight upward offset (-100px)
-->
<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand Background Gradient -->
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5A27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3D6B3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5A27;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle Pattern Overlay -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#splashGradient)"/>
  
  <!-- Subtle Pattern -->
  <rect width="1284" height="2778" fill="url(#gridPattern)"/>
  
  <!-- Safe Area Guides (remove in final) -->
  <rect x="0" y="0" width="1284" height="150" fill="#ff0000" opacity="0.1"/>
  <rect x="0" y="2428" width="1284" height="350" fill="#ff0000" opacity="0.1"/>
  <text x="642" y="75" text-anchor="middle" font-family="Arial" font-size="28" fill="#ffffff" opacity="0.3">Top Safe Zone (150px)</text>
  <text x="642" y="2603" text-anchor="middle" font-family="Arial" font-size="28" fill="#ffffff" opacity="0.3">Bottom Safe Zone (350px)</text>
  
  <!-- Logo Container (centered, offset up by 100px) -->
  <g id="logoContainer" transform="translate(642, 1289)">
    
    <!-- Logo Background Circle (optional) -->
    <circle cx="0" cy="0" r="180" fill="#ffffff" opacity="0.1"/>
    
    <!-- Logo Placeholder (replace with actual) -->
    <g id="logo">
      <!-- Example: Abstract field/nature icon -->
      <path d="M0,-120 C60,-90 90,-30 60,60 C30,90 -30,90 -60,60 C-90,-30 -60,-90 0,-120" 
            fill="#ffffff"/>
      <path d="M0,-60 L30,30 L0,60 L-30,30 Z" 
            fill="url(#splashGradient)" opacity="0.7"/>
    </g>
    
    <!-- App Name (optional) -->
    <text x="0" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="48" font-weight="600" fill="#ffffff" letter-spacing="2">
      FELDHUB
    </text>
    
    <!-- Tagline (optional) -->
    <text x="0" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="24" fill="#ffffff" opacity="0.7">
      Field Service Management
    </text>
  </g>
  
  <!-- Loading Indicator Area (Expo handles this) -->
  <text x="642" y="2350" text-anchor="middle" font-family="Arial" font-size="20" fill="#ffffff" opacity="0.3">
    Loading indicator added by Expo
  </text>
  
  <!-- Footer Guide -->
  <text x="642" y="2750" text-anchor="middle" font-family="Arial" font-size="20" fill="#ffffff" opacity="0.3">
    Export: 1284x2778 PNG (iPhone) / 2048x2732 (iPad)
  </text>
</svg>
